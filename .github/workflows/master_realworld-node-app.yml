name: Build and deploy Node.js app to Azure Web App - realworld-node-app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Build app
        run: npx nx build api

      - name: Copy package.json to dist
        run: cp package.json dist/api/

      - name: Install production dependencies in dist
        run: cd dist/api && npm install --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist/api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1CBFF66070AB44C9A891447C341D71B8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E5E7541D4540433EA3FB599ADB71E7B3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0F245C7AD68C494B84615E2E065EC432 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'realworld-node-app'
          slot-name: 'Production'
          package: .
