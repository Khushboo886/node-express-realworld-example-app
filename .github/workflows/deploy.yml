name: Deploy to Azure VM with Rollback

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            #!/bin/bash
            set -e

            APP_DIR="/var/www/nodeapp/current"
            BACKUP_DIR="/var/www/nodeapp/backup"
            APP_NAME="node-express-realworld"
            # Using 127.0.0.1 is often more reliable than 'localhost' in CI environments
            HEALTH_CHECK_URL="http://127.0.0.1:3000/api"

            echo "========================================="
            echo "Starting deployment at $(date)"
            echo "========================================="

            mkdir -p $(dirname $APP_DIR)

            echo "Creating backup..."
            rm -rf $BACKUP_DIR
            [ -d "$APP_DIR" ] && cp -r $APP_DIR $BACKUP_DIR && echo "Backup created."

            echo "Updating application code..."
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "Installing dependencies..."
            npm ci --production

            echo "Restarting application..."
            if pm2 list | grep -q "$APP_NAME"; then
              pm2 restart $APP_NAME
            else
              pm2 start npm --name "$APP_NAME" -- start
            fi

            pm2 save
            echo "Waiting 10s for app to initialize..."
            sleep 10

            echo "Running health check on $HEALTH_CHECK_URL..."
            # Added -L to follow redirects and --retry
            STATUS=$(curl -s -o /dev/null -L -w "%{http_code}" $HEALTH_CHECK_URL || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (Status: $STATUS). Deployment successful."
              rm -rf $BACKUP_DIR
            else
              echo "HEALTH CHECK FAILED (Status: $STATUS)"
              echo "Showing last 20 lines of logs for debugging:"
              pm2 logs $APP_NAME --lines 20 --no-daemon & sleep 2 && kill $!
              
              echo "Starting rollback..."
              if [ -d "$BACKUP_DIR" ]; then
                rm -rf $APP_DIR
                mv $BACKUP_DIR $APP_DIR
                cd $APP_DIR
                pm2 restart $APP_NAME
                echo "Rollback completed."
              fi
              exit 1
            fi
