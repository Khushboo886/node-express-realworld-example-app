name: Azure VM Deployment with Backup Rollback

on:
 push:
   branches:
     - master

jobs:
 deploy:
   runs-on: ubuntu-latest

   steps:

   - name: Checkout code
     uses: actions/checkout@v4

   - name: Deploy to Azure VM
     uses: appleboy/ssh-action@v1.0.3
     with:
       host: ${{ secrets.VM_HOST }}
       username: ${{ secrets.VM_USER }}
       key: ${{ secrets.VM_SSH_KEY }}
       script: |

         echo "STEP 1: Creating backup"

         TIMESTAMP=$(date +%F-%H-%M)

         if [ -d "/var/www/myapp" ]; then
           tar -czf /var/backups/myapp/backup-$TIMESTAMP.tar.gz /var/www/myapp
         fi

         echo "STEP 2: Deploy new code"

         cd /var/www

         if [ -d "myapp" ]; then
           rm -rf myapp
         fi

         git clone https://github.com/${{ github.repository }} myapp

         cd myapp

         echo "STEP 3: Installing dependencies"

         npm install

         echo "STEP 4: Starting application"

         npm start &

         if [ $? -eq 0 ]; then
           echo "Deployment successful"
           echo "Removing backup"

           rm -f /var/backups/myapp/backup-$TIMESTAMP.tar.gz

         else
           echo "Deployment failed"

           echo "Rolling back to previous version"

           rm -rf /var/www/myapp

           tar -xzf /var/backups/myapp/backup-$TIMESTAMP.tar.gz -C /

           echo "Rollback completed"

           exit 1
         fi
