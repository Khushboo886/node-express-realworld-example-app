name: Deploy to Azure VM with Rollback

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            #!/bin/bash
            set -e

            APP_DIR="/var/www/nodeapp/current"
            BACKUP_DIR="/var/www/nodeapp/backup"
            APP_NAME="node-express-realworld"
            # Using 127.0.0.1 and dropping /api temporarily to see if base URL works
            HEALTH_CHECK_URL="http://127.0.0.1:3000"

            echo "========================================="
            echo "Starting deployment at $(date)"
            echo "========================================="

            # Create directory if missing
            mkdir -p $(dirname $APP_DIR)

            echo "Creating backup..."
            rm -rf $BACKUP_DIR
            if [ -d "$APP_DIR" ]; then
              cp -r $APP_DIR $BACKUP_DIR
            fi

            echo "Updating application code..."
            cd $APP_DIR || exit 1
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "Installing dependencies..."
            npm ci --production

            echo "Restarting application..."
            if pm2 list | grep -q "$APP_NAME"; then
              pm2 restart $APP_NAME --update-env
            else
              pm2 start npm --name "$APP_NAME" -- start
            fi

            pm2 save
            echo "Waiting 10s for app to initialize..."
            sleep 10

            echo "Running health check..."
            # This captures the status code even if the connection fails
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_CHECK_URL || echo "000")

            # Check if status is 200 (or 404/301 which still means the server is UP)
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 404 ] || [ "$STATUS" -eq 301 ]; then
              echo "Health check passed with Status: $STATUS"
              echo "Deployment successful."
              rm -rf $BACKUP_DIR
            else
              echo "!!! HEALTH CHECK FAILED with Status: $STATUS !!!"
              echo "Dumping PM2 logs for last 30 lines:"
              pm2 logs $APP_NAME --lines 30 --no-daemon & sleep 3 && kill $!
              
              echo "Starting rollback..."
              if [ -d "$BACKUP_DIR" ]; then
                rm -rf $APP_DIR
                mv $BACKUP_DIR $APP_DIR
                cd $APP_DIR
                pm2 restart $APP_NAME
                echo "Rollback completed. The previous stable version is now running."
              else
                echo "Rollback failed: No backup found."
              fi
              exit 1
            fi
