name: Deploy to Azure VM with Rollback

on:
push:
branches: [main, master]
workflow_dispatch:

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to Azure VM
    uses: appleboy/ssh-action@v0.1.7
    with:
      host: ${{ secrets.VM_HOST }}
      username: ${{ secrets.VM_USER }}
      key: ${{ secrets.VM_SSH_KEY }}
      script: |
        #!/bin/bash
        set -e

        APP_DIR="/var/www/nodeapp/current"
        BACKUP_DIR="/var/www/nodeapp/backup"
        APP_NAME="node-express-realworld"
        HEALTH_CHECK_URL="http://localhost:3000"

        echo "Starting deployment..."

        # Backup current version
        rm -rf $BACKUP_DIR
        if [ -d "$APP_DIR" ]; then
          cp -r $APP_DIR $BACKUP_DIR
          echo "Backup created"
        fi

        # Pull latest code
        cd $APP_DIR
        git pull origin main || git pull origin master

        # Install dependencies
        npm ci --production

        # Restart application
        if ! pm2 restart $APP_NAME; then
          pm2 start npm --name "$APP_NAME" -- start
        fi

        pm2 save

        sleep 5

        # Health check
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_CHECK_URL)

        if [ "$STATUS" = "200" ]; then
          echo "Deployment successful"
          rm -rf $BACKUP_DIR
        else
          echo "Health check failed. Rolling back..."

          rm -rf $APP_DIR
          mv $BACKUP_DIR $APP_DIR

          cd $APP_DIR
          pm2 restart $APP_NAME

          exit 1
        fi
```
